<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Studio Clone - 3D Canvas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(20, 20, 20, 0.75); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); max-width: 320px; }
        h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.5px; }
        p { font-size: 0.85rem; color: #888; margin-bottom: 15px; }
        .status-badge { display: inline-block; padding: 4px 8px; font-size: 0.75rem; font-weight: bold; border-radius: 20px; background: rgba(0, 255, 100, 0.15); color: #00ff64; border: 1px solid rgba(0, 255, 100, 0.3); }
    </style>
    <!-- Include Three.js and OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-overlay">
        <h1>Flow Studio Web</h1>
        <p>Phase 1: Foundation Viewport</p>
        <div class="status-badge">Engine Active (WebGL)</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. Setup Scene, Camera, and Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 2. Add Controls (Allows mouse rotation/zoom)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01; // Don't go under floor

        // 3. Add Studio Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 4. Add Environment Grid Floor
        const gridHelper = new THREE.GridHelper(60, 60, 0x444444, 0x222222);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // 5. Add a Temporary Target Object (Representing our tracked character)
        const geometry = new THREE.BoxGeometry(1, 2, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0x007aff, roughness: 0.4 });
        const actorProxy = new THREE.Mesh(geometry, material);
        actorProxy.position.y = 1; // Sit on the floor
        actorProxy.castShadow = true;
        scene.add(actorProxy);

        // 6. Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            
            // Simulate a subtle breathing/idle movement using basic math
            actorProxy.position.y = 1 + Math.sin(elapsedTime * 2) * 0.05;
            actorProxy.rotation.y = elapsedTime * 0.2;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 7. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
