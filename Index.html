<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Studio Clone - Studio Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Glassmorphism Sidebar UI */
        #ui-sidebar { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(15, 15, 15, 0.7); width: 340px; max-height: calc(100vh - 40px);
            padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(16px); display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        h1 span { width: 8px; height: 8px; background: #00ff64; border-radius: 50%; box-shadow: 0 0 10px #00ff64; }
        p.subtitle { font-size: 0.8rem; color: #666; margin-top: -15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .section-title { font-size: 0.85rem; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        
        /* Drag & Drop Zones */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 10px;
            padding: 20px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.02);
            transition: all 0.2s ease; position: relative;
        }
        .drop-zone:hover { border-color: #007aff; background: rgba(0, 122, 255, 0.05); }
        .drop-zone p { font-size: 0.8rem; color: #888; pointer-events: none; }
        .drop-zone input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        /* Video Preview Area */
        #video-preview-container { width: 100%; border-radius: 8px; overflow: hidden; background: #000; display: none; border: 1px solid rgba(255,255,255,0.1); }
        #video-preview { width: 100%; height: auto; display: block; }
        
        /* Status Indicator */
        .status-badge { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.04); padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.05); }
        .status-val { color: #007aff; font-weight: bold; }
    </style>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui-sidebar">
        <h1><span></span> Flow Studio Web</h1>
        <p class="subtitle">Next-Gen Pipeline</p>
        
        <div class="status-badge">
            <span>Active Asset:</span>
            <span id="asset-status" class="status-val">Default Proxy Box</span>
        </div>

        <!-- 1. Video Tracking Upload -->
        <div>
            <div class="section-title">1. Tracking Source (Video)</div>
            <div class="drop-zone">
                <p>Drag & drop reference video or click to upload</p>
                <input type="file" id="video-input" accept="video/*">
            </div>
            <div id="video-preview-container" style="margin-top: 10px;">
                <video id="video-preview" controls muted></video>
            </div>
        </div>

        <!-- 2. Target 3D Character Upload -->
        <div>
            <div class="section-title">2. Target Character (GLTF / GLB)</div>
            <div class="drop-zone">
                <p>Drag & drop .gltf / .glb character files</p>
                <input type="file" id="model-input" accept=".gltf,.glb">
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 3D VIEWPORT SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.5, 4.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01;

        // Cinematic Lighting Studio
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 8, 5);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x007aff, 0.6, 10);
        fillLight.position.set(-4, 3, -2);
        scene.add(fillLight);

        const floorGrid = new THREE.GridHelper(50, 50, 0x222222, 0x111111);
        scene.add(floorGrid);

        // Core Dynamic References
        let activeActor = null;
        const gltfLoader = new THREE.GLTFLoader();

        // Load Default Placeholder Box
        function loadDefaultProxy() {
            if(activeActor) scene.remove(activeActor);
            const geometry = new THREE.BoxGeometry(0.8, 1.8, 0.8);
            const material = new THREE.MeshStandardMaterial({ color: 0x007aff, roughness: 0.3, metalness: 0.1 });
            activeActor = new THREE.Mesh(geometry, material);
            activeActor.position.y = 0.9;
            activeActor.castShadow = true;
            activeActor.receiveShadow = true;
            scene.add(activeActor);
        }
        loadDefaultProxy();

        // --- PIPELINE LOGIC (UPLOADS & PIPING) ---

        // Handle Video Source
        document.getElementById('video-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const videoUrl = URL.createObjectURL(file);
            const preview = document.getElementById('video-preview');
            const previewContainer = document.getElementById('video-preview-container');
            
            preview.src = videoUrl;
            previewContainer.style.display = 'block';
        });

        // Handle Custom 3D Character Import (.gltf / .glb)
        document.getElementById('model-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('asset-status').innerText = "Loading Model...";
            document.getElementById('asset-status').style.color = "#ffaa00";

            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = function(event) {
                const contents = event.target.result;

                gltfLoader.parse(contents, '', function(gltf) {
                    // Remove old character model from canvas
                    if (activeActor) scene.remove(activeActor);

                    activeActor = gltf.scene;
                    
                    // Auto-adjust scale to fit standard human size proportions
                    const box = new THREE.Box3().setFromObject(activeActor);
                    const size = box.getSize(new THREE.Vector3());
                    const scaleFactor = 1.8 / size.y; // Standardize to 1.8 meters high
                    activeActor.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    
                    // Center the model's feet perfectly on the ground grid
                    activeActor.position.set(0, 0, 0);
                    
                    activeActor.traverse(function(node) {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                        }
                    });

                    scene.add(activeActor);
                    
                    document.getElementById('asset-status').innerText = file.name.substring(0, 18) + "...";
                    document.getElementById('asset-status').style.color = "#00ff64";
                }, function(error) {
                    console.error(error);
                    document.getElementById('asset-status').innerText = "Error Loading File";
                    document.getElementById('asset-status').style.color = "#ff3b30";
                });
            };
        });

        // Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Responsive Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
