<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Studio Clone - Bone Test Rig</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Interactive Side Panel */
        #ui-sidebar { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(12, 12, 12, 0.8); width: 350px; max-height: calc(100vh - 40px);
            padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px); display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        
        h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        h1 span { width: 8px; height: 8px; background: #007aff; border-radius: 50%; box-shadow: 0 0 10px #007aff; }
        .section-title { font-size: 0.8rem; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        
        #pipeline-loader { background: rgba(0, 122, 255, 0.15); border: 1px solid #007aff; padding: 10px; border-radius: 8px; font-size: 0.8rem; color: #fff; text-align: center; }
        
        /* Slider Components */
        .slider-group { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 14px; border-radius: 10px; display: flex; flex-direction: column; gap: 12px; }
        .control-row { display: flex; flex-direction: column; gap: 4px; }
        .control-row label { font-size: 0.75rem; color: #aaa; display: flex; justify-content: space-between; }
        .control-row input { width: 100%; accent-color: #007aff; cursor: pointer; background: #222; height: 6px; border-radius: 3px; outline: none; }
        
        #mapping-panel { display: block; background: rgba(255,255,255,0.03); padding: 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .bone-selector { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .bone-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); 
            color: #ccc; padding: 10px; border-radius: 6px; text-align: left; font-size: 0.85rem; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .bone-btn.mapped { border-color: #00ff64; color: #00ff64; }
        .marker-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
        .bone-btn.mapped .marker-dot { background: #00ff64; box-shadow: 0 0 8px #00ff64; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui-sidebar">
        <h1><span></span> Flow Studio Pro</h1>
        
        <div id="pipeline-loader">📡 Initializing target grid...</div>

        <!-- Rig Diagnosis Sliders -->
        <div>
            <div class="section-title">Manual Bone Manipulation Diagnostic</div>
            <div class="slider-group">
                <div class="control-row">
                    <label><span>Left Shoulder Roll (Z Axis)</span><span id="val-11">0°</span></label>
                    <input type="range" id="slider-shoulder-l" min="-90" max="135" value="0">
                </div>
                <div class="control-row">
                    <label><span>Right Shoulder Roll (Z Axis)</span><span id="val-12">0°</span></label>
                    <input type="range" id="slider-shoulder-r" min="-90" max="135" value="0">
                </div>
                <div class="control-row">
                    <label><span>Hip Spread (Legs Out)</span><span id="val-23">0°</span></label>
                    <input type="range" id="slider-hips" min="-10" max="60" value="0">
                </div>
            </div>
        </div>

        <div id="mapping-panel">
            <div class="section-title">Joint Reference Map Status</div>
            <div class="bone-selector">
                <div class="bone-btn" data-joint="11">Left Shoulder <span class="marker-dot"></span></div>
                <div class="bone-btn" data-joint="12">Right Shoulder <span class="marker-dot"></span></div>
                <div class="bone-btn" data-joint="13">Left Elbow <span class="marker-dot"></span></div>
                <div class="bone-btn" data-joint="14">Right Elbow <span class="marker-dot"></span></div>
                <div class="bone-btn" data-joint="23">Left Hip Joint <span class="marker-dot"></span></div>
                <div class="bone-btn" data-joint="24">Right Hip Joint <span class="marker-dot"></span></div>
                <div class="bone-btn" data-joint="25">Left Knee <span class="marker-dot"></span></div>
                <div class="bone-btn" data-joint="26">Right Knee <span class="marker-dot"></span></div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.4, 2.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const skyLight = new THREE.DirectionalLight(0xffffff, 1.2);
        skyLight.position.set(5, 10, 5);
        scene.add(skyLight);
        
        const grid = new THREE.GridHelper(40, 40, 0x1c1c1c, 0x0c0c0c);
        scene.add(grid);

        let activeMesh = null;
        const visualMarkers = {};          
        const internalBoneObjects = {};     
        
        const gltfLoader = new THREE.GLTFLoader();

        // Target updated to clean un-animated XBot model file
        const DEFAULT_MODEL_URL = "https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/XBot.glb";

        // Mixamo skeleton structure mapping definitions
        const defaultSkeletonMap = {
            "11": "mixamorigLeftArm",      
            "12": "mixamorigRightArm",     
            "13": "mixamorigLeftForeArm",  
            "14": "mixamorigRightForeArm", 
            "23": "mixamorigLeftUpLeg",    
            "24": "mixamorigRightUpLeg",   
            "25": "mixamorigLeftLeg",      
            "26": "mixamorigRightLeg"      
        };

        function loadStudioCharacter(url) {
            document.getElementById('pipeline-loader').innerText = "📡 Hooking Character Grid Structure...";
            
            gltfLoader.load(url, function(gltf) {
                if (activeMesh) scene.remove(activeMesh);
                activeMesh = gltf.scene;
                
                // Scale normalization matrix calculations
                const boundingBox = new THREE.Box3().setFromObject(activeMesh);
                const dimensions = boundingBox.getSize(new THREE.Vector3());
                const correctionRatio = 1.75 / dimensions.y;
                activeMesh.scale.set(correctionRatio, correctionRatio, correctionRatio);
                activeMesh.position.set(0, 0, 0);

                // Traverse mesh to unlock local transforms explicitly 
                activeMesh.traverse(node => {
                    if (node.isBone) {
                        node.matrixAutoUpdate = true;
                    }
                });

                scene.add(activeMesh);
                
                // Link skeleton tracking nodes
                Object.keys(defaultSkeletonMap).forEach(key => {
                    const boneName = defaultSkeletonMap[key];
                    const foundBone = activeMesh.getObjectByName(boneName);
                    if (foundBone) {
                        internalBoneObjects[key] = foundBone;
                        
                        // Generate tracking spheres for local reference diagnostics
                        const markerGeo = new THREE.SphereGeometry(0.02, 16, 16);
                        const markerMat = new THREE.MeshBasicMaterial({ color: 0x00ff64, depthTest: false });
                        const sphereMesh = new THREE.Mesh(markerGeo, markerMat);
                        sphereMesh.renderOrder = 999;
                        scene.add(sphereMesh);
                        visualMarkers[key] = sphereMesh;

                        const btn = document.querySelector(`.bone-btn[data-joint="${key}"]`);
                        if (btn) btn.classList.add('mapped');
                    }
                });

                document.getElementById('pipeline-loader').innerText = "✅ Diagnostic Mode Active: Sliders Ready";
                document.getElementById('pipeline-loader').style.background = "rgba(0, 255, 100, 0.1)";
                
                setupSliderListeners();
            });
        }

        function setupSliderListeners() {
            // Left Shoulder Slider Map
            document.getElementById('slider-shoulder-l').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('val-11').innerText = val + "°";
                const radians = (val * Math.PI) / 180;
                if (internalBoneObjects["11"]) {
                    // Mixamo arms utilize local rotation profiles
                    internalBoneObjects["11"].rotation.z = radians; 
                }
            });

            // Right Shoulder Slider Map
            document.getElementById('slider-shoulder-r').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('val-12').innerText = val + "°";
                const radians = (val * Math.PI) / 180;
                if (internalBoneObjects["12"]) {
                    internalBoneObjects["12"].rotation.z = -radians; 
                }
            });

            // Hip Joint Spread Slider Map
            document.getElementById('slider-hips').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('val-23').innerText = val + "°";
                const radians = (val * Math.PI) / 180;
                if (internalBoneObjects["23"]) internalBoneObjects["23"].rotation.z = radians;
                if (internalBoneObjects["24"]) internalBoneObjects["24"].rotation.z = -radians;
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadStudioCharacter(DEFAULT_MODEL_URL);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Project visual markers into real-time absolute matrix coordinates
            Object.keys(internalBoneObjects).forEach(key => {
                if (visualMarkers[key] && internalBoneObjects[key]) {
                    const worldPosition = new THREE.Vector3();
                    internalBoneObjects[key].getWorldPosition(worldPosition);
                    visualMarkers[key].position.copy(worldPosition);
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
