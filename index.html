<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Studio Pro - Motion Capture Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-sidebar { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(12, 12, 12, 0.85); width: 360px; max-height: calc(100vh - 40px);
            padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px); display: flex; flex-direction: column; gap: 18px;
            overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        
        h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        h1 span { width: 8px; height: 8px; background: #007aff; border-radius: 50%; box-shadow: 0 0 10px #007aff; }
        .section-title { font-size: 0.75rem; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        
        #pipeline-loader { background: rgba(0, 122, 255, 0.15); border: 1px solid #007aff; padding: 10px; border-radius: 8px; font-size: 0.8rem; color: #fff; text-align: center; font-weight: 500; transition: all 0.3s ease; }
        
        .video-upload-box {
            background: rgba(255, 255, 255, 0.02); border: 2px dashed rgba(255,255,255,0.1);
            padding: 16px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s ease;
        }
        .video-upload-box:hover { border-color: #007aff; background: rgba(0, 122, 255, 0.05); }
        .video-upload-box p { font-size: 0.8rem; color: #aaa; }
        .video-controls { display: flex; gap: 8px; margin-top: 8px; }
        .v-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 6px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; text-align: center;}
        .v-btn:hover { background: #222; }
        .v-btn.active { background: #007aff; border-color: #007aff; }

        /* Floating Diagnostic PIP Window */
        #diagnostic-monitor {
            position: absolute; bottom: 20px; right: 20px; z-index: 10;
            width: 280px; height: 180px; background: #111;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }
        #diagnostic-monitor .title {
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            padding: 6px 10px; background: rgba(255,255,255,0.03); color: #888;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        #mocap-canvas { width: 100%; height: calc(100% - 24px); object-fit: cover; background: #000; }

        .slider-group { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); padding: 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; max-height: 130px; overflow-y: auto; }
        .control-row { display: flex; flex-direction: column; gap: 4px; }
        .control-row label { font-size: 0.72rem; color: #aaa; display: flex; justify-content: space-between; }
        .control-row input { width: 100%; accent-color: #007aff; cursor: pointer; background: #222; height: 4px; border-radius: 2px; outline: none; }
        
        #mapping-panel { background: rgba(255,255,255,0.02); padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.04); }
        .bone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
        .bone-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); 
            color: #888; padding: 8px; border-radius: 6px; text-align: left; font-size: 0.75rem; 
            display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease;
        }
        .bone-btn.mapped { border-color: #00ff64; color: #fff; background: rgba(0, 255, 100, 0.02); }
        .marker-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; }
        .bone-btn.mapped .marker-dot { background: #00ff64; box-shadow: 0 0 6px #00ff64; }
    </style>
    <!-- Core Engine Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- MediaPipe Tracking Framework & Utility Draw Extensions -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui-sidebar">
        <h1><span></span> Flow Studio Pro</h1>
        
        <div id="pipeline-loader">📡 Stream Initialization Active...</div>
        
        <div>
            <div class="section-title">VFX Rotoscope Plate Input</div>
            <div class="video-upload-box" onclick="document.getElementById('video-input').click()">
                <p id="upload-status">📁 Click to upload reference footage (.mp4)</p>
                <input type="file" id="video-input" accept="video/mp4" style="display:none;">
            </div>
            <div class="video-controls">
                <button class="v-btn" id="btn-video-play">Play / Pause</button>
                <button class="v-btn" id="btn-mesh-opacity">Toggle Mesh Style</button>
            </div>
            <div class="video-controls">
                <button class="v-btn" id="btn-mocap-toggle">🔴 AI Mocap Stream: OFF</button>
            </div>
        </div>

        <div>
            <div class="section-title">Manual Manipulation Controls</div>
            <div class="slider-group">
                <div class="control-row"><label><span>Head (X Axis)</span><span id="val-head">0°</span></label><input type="range" id="slider-head" min="-45" max="45" value="0"></div>
                <div class="control-row"><label><span>Spine (X Axis)</span><span id="val-spine">0°</span></label><input type="range" id="slider-spine" min="-30" max="45" value="0"></div>
                <div class="control-row"><label><span>Left Shoulder Roll</span><span id="val-shoulder-l">0°</span></label><input type="range" id="slider-shoulder-l" min="-90" max="90" value="0"></div>
                <div class="control-row"><label><span>Right Shoulder Roll</span><span id="val-shoulder-r">0°</span></label><input type="range" id="slider-shoulder-r" min="-90" max="90" value="0"></div>
                <div class="control-row"><label><span>Left Elbow Hinge</span><span id="val-elbow-l">0°</span></label><input type="range" id="slider-elbow-l" min="0" max="130" value="0"></div>
                <div class="control-row"><label><span>Right Elbow Hinge</span><span id="val-elbow-r">0°</span></label><input type="range" id="slider-elbow-r" min="0" max="130" value="0"></div>
                <div class="control-row"><label><span>Left Hip Roll</span><span id="val-hip-l">0°</span></label><input type="range" id="slider-hip-l" min="-30" max="90" value="0"></div>
                <div class="control-row"><label><span>Right Hip Roll</span><span id="val-hip-r">0°</span></label><input type="range" id="slider-hip-r" min="-30" max="90" value="0"></div>
                <div class="control-row"><label><span>Left Knee Hinge</span><span id="val-knee-l">0°</span></label><input type="range" id="slider-knee-l" min="-130" max="0" value="0"></div>
                <div class="control-row"><label><span>Right Knee Hinge</span><span id="val-knee-r">0°</span></label><input type="range" id="slider-knee-r" min="-130" max="0" value="0"></div>
            </div>
        </div>

        <div id="mapping-panel">
            <div class="section-title">Skeleton Map Matrix</div>
            <div class="bone-grid">
                <div class="bone-btn" id="btn-head">Head <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-spine">Spine <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-shoulder-l">L Shoulder <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-shoulder-r">R Shoulder <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-elbow-l">L Elbow <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-elbow-r">R Elbow <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-hip-l">L Hip <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-hip-r">R Hip <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-knee-l">L Knee <span class="marker-dot"></span></div>
                <div class="bone-btn" id="btn-knee-r">R Knee <span class="marker-dot"></span></div>
            </div>
        </div>
    </div>

    <!-- PIP Diagnostic Feedback Viewport -->
    <div id="diagnostic-monitor">
        <div class="title">📡 AI tracking diagnostic monitor</div>
        <canvas id="mocap-canvas"></canvas>
    </div>

    <div id="canvas-container"></div>

<script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 2.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.0, 0);

        // --- PIP & Machine Learning Framework Matrix Global Configurations ---
        let videoElement, videoTexture, videoBackgroundPlane;
        let diagnosticCanvas, diagnosticCtx;
        let isXrayMeshMode = false;
        let isMocapActive = false;
        let poseTrackerEngine;
        let lastProcessedTime = 0;
        let lastTrackingResults = null; // Store tracking results to render in main loop
        const characterMeshes = [];

        // --- Interactive 3D Gizmo System ---
        const transformGizmo = new THREE.TransformControls(camera, renderer.domElement);
        transformGizmo.setMode('rotate');
        transformGizmo.setSize(0.6);
        
        transformGizmo.addEventListener('dragging-changed', (event) => {
            controls.enabled = !event.value;
        });
        
        transformGizmo.addEventListener('change', () => {
            if (transformGizmo.object && transformGizmo.object.userData.linkedBoneKey) {
                updateSlidersFromGizmo(transformGizmo.object.userData.linkedBoneKey);
            }
        });
        scene.add(transformGizmo);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(3, 10, 5);
        scene.add(dirLight);
        
        const grid = new THREE.GridHelper(30, 30, 0x1c1c1c, 0x0c0c0c);
        scene.add(grid);

        let boneMap = {};
        const visualMarkers = [];
        const clickableTargets = [];

        const boneTargetNames = {
            head: "Head",
            spine: "Spine1",
            shoulderL: "LeftArm",
            shoulderR: "RightArm",
            elbowL: "LeftForeArm",
            elbowR: "RightForeArm",
            hipL: "LeftUpLeg",
            hipR: "RightUpLeg",
            kneeL: "LeftLeg",
            kneeR: "RightLeg"
        };

        function computeJointAngle2D(jointA, jointB) {
            return Math.atan2(jointB.y - jointA.y, jointB.x - jointA.x);
        }

        // --- Tracking Solver with Visible Skeleton PIP Draw ---
        function setupMocapTrackingBrain() {
            diagnosticCanvas = document.getElementById('mocap-canvas');
            diagnosticCtx = diagnosticCanvas.getContext('2d');

            poseTrackerEngine = new Pose({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
            });

            poseTrackerEngine.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            poseTrackerEngine.onResults((results) => {
                // Save results to draw synchronized in the main requestAnimationFrame loop
                lastTrackingResults = results;

                if (!isMocapActive || !results.poseLandmarks) return;

                const landmarks = results.poseLandmarks;
                const L_Shoulder = landmarks[11];
                const R_Shoulder = landmarks[12];
                const L_Elbow = landmarks[13];
                const R_Elbow = landmarks[14];
                const L_Wrist = landmarks[15];
                const R_Wrist = landmarks[16];
                const L_Hip = landmarks[23];
                const R_Hip = landmarks[24];
                const L_Knee = landmarks[25];
                const R_Knee = landmarks[26];
                const L_Ankle = landmarks[27];
                const R_Ankle = landmarks[28];

                // Left Arm Transform mappings
                if (boneMap.shoulderL && L_Shoulder && L_Elbow) {
                    let angle = computeJointAngle2D(L_Shoulder, L_Elbow) + Math.PI;
                    boneMap.shoulderL.rotation.y = angle;
                    updateSliderUIElement('shoulder-l', Math.round((angle * 180) / Math.PI));
                }
                if (boneMap.elbowL && L_Elbow && L_Wrist) {
                    let angle = Math.abs(computeJointAngle2D(L_Elbow, L_Wrist) - computeJointAngle2D(L_Shoulder, L_Elbow));
                    boneMap.elbowL.rotation.x = Math.max(0, Math.min(angle, 2.2));
                    updateSliderUIElement('elbow-l', Math.round((boneMap.elbowL.rotation.x * 180) / Math.PI));
                }

                // Right Arm Transform mappings
                if (boneMap.shoulderR && R_Shoulder && R_Elbow) {
                    let angle = computeJointAngle2D(R_Shoulder, R_Elbow);
                    boneMap.shoulderR.rotation.y = -angle;
                    updateSliderUIElement('shoulder-r', Math.round((angle * 180) / Math.PI));
                }
                if (boneMap.elbowR && R_Elbow && R_Wrist) {
                    let angle = Math.abs(computeJointAngle2D(R_Elbow, R_Wrist) - computeJointAngle2D(R_Shoulder, R_Elbow));
                    boneMap.elbowR.rotation.x = Math.max(0, Math.min(angle, 2.2));
                    updateSliderUIElement('elbow-r', Math.round((boneMap.elbowR.rotation.x * 180) / Math.PI));
                }

                // Hips & Legs mapping matrices
                if (boneMap.hipL && L_Hip && L_Knee) {
                    let angle = computeJointAngle2D(L_Hip, L_Knee) - Math.PI / 2;
                    boneMap.hipL.rotation.z = -angle;
                    updateSliderUIElement('hip-l', Math.round((angle * 180) / Math.PI));
                }
                if (boneMap.kneeL && L_Knee && L_Ankle) {
                    let angle = computeJointAngle2D(L_Knee, L_Ankle) - computeJointAngle2D(L_Hip, L_Knee);
                    boneMap.kneeL.rotation.x = -Math.max(0, Math.min(Math.abs(angle), 2.2));
                    updateSliderUIElement('knee-l', Math.round((boneMap.kneeL.rotation.x * 180) / Math.PI));
                }

                if (boneMap.hipR && R_Hip && R_Knee) {
                    let angle = computeJointAngle2D(R_Hip, R_Knee) - Math.PI / 2;
                    boneMap.hipR.rotation.z = -angle;
                    updateSliderUIElement('hip-r', Math.round((angle * 180) / Math.PI));
                }
                if (boneMap.kneeR && R_Knee && R_Ankle) {
                    let angle = computeJointAngle2D(R_Knee, R_Ankle) - computeJointAngle2D(R_Hip, R_Knee);
                    boneMap.kneeR.rotation.x = -Math.max(0, Math.min(Math.abs(angle), 2.2));
                    updateSliderUIElement('knee-r', Math.round((boneMap.kneeR.rotation.x * 180) / Math.PI));
                }
            });

            const mocapBtn = document.getElementById('btn-mocap-toggle');
            mocapBtn.addEventListener('click', () => {
                isMocapActive = !isMocapActive;
                if (isMocapActive) {
                    mocapBtn.innerText = "🟢 AI Mocap Stream: RUNNING";
                    mocapBtn.classList.add('active');
                } else {
                    mocapBtn.innerText = "🔴 AI Mocap Stream: OFF";
                    mocapBtn.classList.remove('active');
                    lastTrackingResults = null; // Clear tracking skeleton lines on diagnostic
                }
            });
        }

        function updateSliderUIElement(id, val) {
            const slider = document.getElementById('slider-' + id);
            const display = document.getElementById('val-' + id);
            if (slider && display) {
                slider.value = val;
                display.innerText = val + "°";
            }
        }

        function setupVideoBackgroundSystem() {
            videoElement = document.createElement('video');
            videoElement.loop = true;
            videoElement.muted = true;
            videoElement.playsInline = true;

            videoTexture = new THREE.VideoTexture(videoElement);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;

            const bgGeometry = new THREE.PlaneGeometry(2, 2);
            const bgMaterial = new THREE.MeshBasicMaterial({ map: videoTexture, depthTest: false, depthWrite: false });
            videoBackgroundPlane = new THREE.Mesh(bgGeometry, bgMaterial);
            videoBackgroundPlane.position.set(0, 0, -1);
            
            const backgroundScene = new THREE.Scene();
            const backgroundCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            backgroundScene.add(videoBackgroundPlane);
            
            renderer.autoClear = false;
            window.backgroundPipeline = { scene: backgroundScene, camera: backgroundCamera };

            document.getElementById('video-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    videoElement.src = url;
                    
                    videoElement.addEventListener('loadedmetadata', () => {
                        // Dynamically match canvas viewport sizes on load
                        diagnosticCanvas.width = videoElement.videoWidth / 2;
                        diagnosticCanvas.height = videoElement.videoHeight / 2;
                    });
                    
                    videoElement.play();
                    document.getElementById('upload-status').innerText = `🎥 Active Plate: ${file.name}`;
                }
            });

            document.getElementById('btn-video-play').addEventListener('click', () => {
                if (videoElement.paused) videoElement.play();
                else videoElement.pause();
            });

            document.getElementById('btn-mesh-opacity').addEventListener('click', () => {
                isXrayMeshMode = !isXrayMeshMode;
                characterMeshes.forEach(mesh => {
                    mesh.material.transparent = isXrayMeshMode;
                    mesh.material.opacity = isXrayMeshMode ? 0.35 : 1.0;
                    mesh.material.wireframe = isXrayMeshMode;
                });
            });
        }

        function loadCharacterAsset() {
            const loader = new THREE.GLTFLoader();
            const modelUrl = 'Xbot.glb';

            loader.load(modelUrl, (gltf) => {
                const character = gltf.scene;
                
                character.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        characterMeshes.push(child);
                        if (child.material) {
                            child.material.skinning = true; 
                            child.material.roughness = 0.5;
                        }
                    }
                    if (child.isBone) {
                        if (child.name.endsWith(boneTargetNames.head)) boneMap.head = child;
                        if (child.name.endsWith(boneTargetNames.spine)) boneMap.spine = child;
                        if (child.name.endsWith(boneTargetNames.shoulderL)) boneMap.shoulderL = child;
                        if (child.name.endsWith(boneTargetNames.shoulderR)) boneMap.shoulderR = child;
                        if (child.name.endsWith(boneTargetNames.elbowL)) boneMap.elbowL = child;
                        if (child.name.endsWith(boneTargetNames.elbowR)) boneMap.elbowR = child;
                        if (child.name.endsWith(boneTargetNames.hipL)) boneMap.hipL = child;
                        if (child.name.endsWith(boneTargetNames.hipR)) boneMap.hipR = child;
                        if (child.name.endsWith(boneTargetNames.kneeL)) boneMap.kneeL = child;
                        if (child.name.endsWith(boneTargetNames.kneeR)) boneMap.kneeR = child;
                    }
                });

                scene.add(character);
                verifyAndActivateRig();

            }, (xhr) => {
                let percent = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('pipeline-loader').innerText = `📥 Downloading Rig Framework: ${percent}%`;
            }, (error) => {
                document.getElementById('pipeline-loader').innerText = `❌ Asset Load Error. Running Core Fallback.`;
                generateFallbackRigEngine();
            });
        }

        function verifyAndActivateRig() {
            let activeBonesCount = 0;

            Object.keys(boneTargetNames).forEach(key => {
                if (boneMap[key]) {
                    const btnId = 'btn-' + key.replace(/([A-Z])/g, "-$1").toLowerCase();
                    const element = document.getElementById(btnId);
                    if (element) element.classList.add('mapped');
                    
                    attachTrackerDot(boneMap[key], key);
                    activeBonesCount++;
                }
            });

            const loaderStatus = document.getElementById('pipeline-loader');
            if (activeBonesCount > 0) {
                loaderStatus.innerText = "✅ Advanced Mesh Active: Gizmos Ready";
                loaderStatus.style.background = "rgba(0, 255, 100, 0.15)";
                loaderStatus.style.borderColor = "#00ff64";
            } else {
                generateFallbackRigEngine();
            }

            bindControlListeners();
        }

        function attachTrackerDot(boneTarget, boneKey) {
            const markerGeo = new THREE.SphereGeometry(0.03, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0x00ff64, depthTest: false });
            const sphere = new THREE.Mesh(markerGeo, markerMat);
            sphere.renderOrder = 999;
            
            sphere.userData = { isNode: true, boneKey: boneKey, linkedBone: boneTarget };
            
            scene.add(sphere);
            visualMarkers.push({ sphere, bone: boneTarget });
            clickableTargets.push(sphere);
        }

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableTargets);

            if (intersects.length > 0) {
                const targetNode = intersects[0].object;
                transformGizmo.attach(targetNode.userData.linkedBone);
                transformGizmo.object.userData.linkedBoneKey = targetNode.userData.boneKey;
            } else {
                if (transformGizmo.dragging === false && !event.target.closest('#ui-sidebar')) {
                    transformGizmo.detach();
                }
            }
        });

        function updateSlidersFromGizmo(boneKey) {
            const bone = boneMap[boneKey];
            if (!bone) return;

            let val = 0;
            if (boneKey.includes('shoulder')) {
                val = Math.round((bone.rotation.y * 180) / Math.PI);
                if (boneKey === 'shoulderR') val = -val;
            } else if (boneKey.includes('hip')) {
                val = Math.round((bone.rotation.z * 180) / Math.PI);
            } else if (boneKey.includes('elbow') || boneKey.includes('knee') || boneKey === 'head' || boneKey === 'spine') {
                val = Math.round((bone.rotation.x * 180) / Math.PI);
            }

            updateSliderUIElement(boneKey.replace(/([A-Z])/g, "-$1").toLowerCase(), val);
        }

        function generateFallbackRigEngine() {
            document.getElementById('pipeline-loader').innerText = "⚙ Offline Fallback Engine Initialized";
            const geometry = new THREE.CylinderGeometry(0.05, 0.07, 1.5, 16, 10);
            const pos = geometry.attributes.position;
            const indices = [], weights = [];

            for (let i = 0; i < pos.count; i++) {
                let y = pos.getY(i) + 0.75;
                let idx = y < 0.75 ? 0 : 1;
                indices.push(idx, 0, 0, 0);
                weights.push(1, 0, 0, 0);
            }
            geometry.setAttribute('skinIndex', new THREE.Uint16BufferAttribute(indices, 4));
            geometry.setAttribute('skinWeight', new THREE.Float32BufferAttribute(weights, 4));

            const root = new THREE.Bone();
            const child = new THREE.Bone();
            root.position.y = -0.75;
            child.position.y = 0.75;
            root.add(child);

            const mat = new THREE.MeshStandardMaterial({ color: 0x007aff, wireframe: true, skinning: true });
            const fallbackMesh = new THREE.SkinnedMesh(geometry, mat);
            characterMeshes.push(fallbackMesh);
            fallbackMesh.add(root);
            fallbackMesh.bind(new THREE.Skeleton([root, child]));
            fallbackMesh.position.y = 1.0;
            scene.add(fallbackMesh);

            boneMap.shoulderL = root;
            boneMap.elbowL = child;
            
            document.getElementById('btn-shoulder-l').classList.add('mapped');
            document.getElementById('btn-elbow-l').classList.add('mapped');
            attachTrackerDot(root, 'shoulderL');
            attachTrackerDot(child, 'elbowL');
            
            bindControlListeners();
        }

        function bindControlListeners() {
            const setupSlider = (id, boneKey, axis, inverted = false) => {
                const slider = document.getElementById('slider-' + id);
                if (!slider) return;
                
                slider.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    document.getElementById('val-' + id).innerText = val + "°";
                    if (boneMap[boneKey]) {
                        let rad = (val * Math.PI) / 180;
                        boneMap[boneKey].rotation[axis] = inverted ? -rad : rad;
                    }
                });
            };

            setupSlider('head', 'head', 'x');
            setupSlider('spine', 'spine', 'x');
            setupSlider('shoulder-l', 'shoulderL', 'y');
            setupSlider('shoulder-r', 'shoulderR', 'y', true);
            setupSlider('elbow-l', 'elbowL', 'x');
            setupSlider('elbow-r', 'elbowR', 'x');
            setupSlider('hip-l', 'hipL', 'z');
            setupSlider('hip-r', 'hipR', 'z');
            setupSlider('knee-l', 'kneeL', 'x');
            setupSlider('knee-r', 'kneeR', 'x');
        }

        window.addEventListener('DOMContentLoaded', () => {
            setupVideoBackgroundSystem();
            setupMocapTrackingBrain();
            loadCharacterAsset();
        });

        function animate(timestamp) {
            requestAnimationFrame(animate);
            controls.update();

            visualMarkers.forEach(item => {
                const worldPos = new THREE.Vector3();
                item.bone.getWorldPosition(worldPos);
                item.sphere.position.copy(worldPos);
            });

            // --- Realtime Diagnostic Canvas PIP rendering ---
            if (videoElement && videoElement.readyState >= videoElement.HAVE_CURRENT_DATA) {
                // Clear the PIP canvas and draw the current video frame instantly
                diagnosticCtx.clearRect(0, 0, diagnosticCanvas.width, diagnosticCanvas.height);
                diagnosticCtx.drawImage(videoElement, 0, 0, diagnosticCanvas.width, diagnosticCanvas.height);

                // Overlay the green skeleton tracking markers if we have active AI data
                if (isMocapActive && lastTrackingResults && lastTrackingResults.poseLandmarks) {
                    drawConnectors(diagnosticCtx, lastTrackingResults.poseLandmarks, POSE_CONNECTORS, { color: '#00ff64', lineWidth: 2 });
                    drawLandmarks(diagnosticCtx, lastTrackingResults.poseLandmarks, { color: '#007aff', lineWidth: 1, radius: 2 });
                }
            }

            // Throttled frame pipeline feeding data to MediaPipe at 30FPS max cadence limits
            if (isMocapActive && poseTrackerEngine && videoElement && !videoElement.paused && timestamp - lastProcessedTime > 33) {
                if (videoElement.readyState >= videoElement.HAVE_CURRENT_DATA) {
                    poseTrackerEngine.send({ image: videoElement });
                    lastProcessedTime = timestamp;
                }
            }

            renderer.clear();
            if (window.backgroundPipeline && videoElement && videoElement.readyState >= videoElement.HAVE_CURRENT_DATA) {
                renderer.render(window.backgroundPipeline.scene, window.backgroundPipeline.camera);
            }
            renderer.render(scene, camera);
        }
        animate(0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
