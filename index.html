<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Studio Pro - Local Motion Aligner</title>
    
    <!-- Three.js Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

    <style>
        :root {
            --bg-primary: #0a0a0c;
            --accent-green: #00ff64;
            --accent-blue: #007aff;
            --accent-orange: #ff9500;
            --text-main: #e2e8f0;
            --border-color: #2a2a36;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg-primary); font-family: monospace; color: var(--text-main); overflow: hidden; }

        #app-container { width: 100vw; height: 100vh; position: relative; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* HUD */
        #hud-display {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(10, 10, 12, 0.75);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            pointer-events: none;
            backdrop-filter: blur(10px);
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .status-val { font-weight: bold; }
        .val-on { color: var(--accent-green); }
        .val-off { color: #ff453a; }

        /* Controls Map Card */
        #quick-guide {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(10, 10, 12, 0.85);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            width: 320px;
            font-size: 0.8rem;
            line-height: 1.6;
            backdrop-filter: blur(10px);
        }
        #quick-guide h3 { border-bottom: 1px dashed var(--border-color); padding-bottom: 5px; margin-bottom: 8px; color: var(--accent-green); }
        .key-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .key-cap { background: #1c1c24; padding: 1px 6px; border-radius: 3px; border: 1px solid #3a3a4c; font-weight: bold; }

        /* Timeline Player */
        #mocap-timeline-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(18, 18, 22, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 20px;
            z-index: 5;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #keyframe-track-wrapper {
            position: relative;
            width: 100%;
            height: 12px;
            background: #121216;
            border-radius: 4px;
            border: 1px solid #1c1c24;
        }
        .keyframe-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border: 1px solid #fff;
            cursor: pointer;
            z-index: 10;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        #btn-video-play {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            outline: none;
        }
        #timeline-slider { flex: 1; -webkit-appearance: none; background: #2a2a35; height: 6px; border-radius: 3px; outline: none; }
        #timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent-green); cursor: pointer; }
        #timeline-time { font-size: 0.85rem; min-width: 100px; color: var(--text-main); text-align: right; }

        .hidden-input { display: none; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Dashboard Overlay -->
        <div id="hud-display">
            <div>[V] Loaded Video: <span id="hud-video" class="status-val val-off">NONE</span></div>
            <div>[J] YOLO Motion: <span id="hud-dataset" class="status-val val-off">NOT LOADED</span></div>
            <div id="hud-log" style="margin-top: 8px; color: #8a99ad; max-width: 320px; font-size: 0.75rem;">Press [V] to select your video. Press [J] to import the 'motion_data.json'.</div>
        </div>

        <!-- Reference Guide -->
        <div id="quick-guide">
            <h3>🎬 PLAYBACK CONTROLS</h3>
            <div class="key-row"><span>Load Video File</span><span class="key-cap">V</span></div>
            <div class="key-row"><span>Load YOLO JSON</span><span class="key-cap">J</span></div>
            <div class="key-row"><span>Play / Pause</span><span class="key-cap">Space</span></div>
            <div class="key-row"><span>Toggle Wireframe Mesh</span><span class="key-cap">X</span></div>
        </div>

        <!-- Hidden File Inputs -->
        <input type="file" id="video-input" class="hidden-input" accept="video/*">
        <input type="file" id="motion-input" class="hidden-input" accept=".json">

        <!-- 3D Graphics Viewport -->
        <div id="canvas-container"></div>

        <!-- Master Player Timeline -->
        <div id="mocap-timeline-container">
            <div id="keyframe-track-wrapper"></div>
            <div class="slider-row">
                <button id="btn-video-play">▶</button>
                <input type="range" id="timeline-slider" min="0" max="100" value="0">
                <div id="timeline-time">00:00 / 00:00</div>
            </div>
        </div>
    </div>

    <script>
        // --- 3D Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 2.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.0, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(3, 10, 5);
        scene.add(dirLight);
        
        const grid = new THREE.GridHelper(30, 30, 0x1c1c1c, 0x0c0c0c);
        scene.add(grid);

        // --- Core Variables ---
        let videoElement, videoTexture, videoBackgroundPlane;
        let isXrayMeshMode = false;
        let boneMap = {};
        let importedMotionTrack = [];
        const characterMeshes = [];

        // Bone Target Key-Map (Using Xbot Standard Rig names)
        const boneTargetNames = {
            shoulderL: "LeftArm", shoulderR: "RightArm",
            elbowL: "LeftForeArm", elbowR: "RightForeArm",
            hipL: "LeftUpLeg", hipR: "RightUpLeg",
            kneeL: "LeftLeg", kneeR: "RightLeg"
        };

        // --- Video Background Projection System ---
        function setupVideoPlane() {
            videoElement = document.createElement('video');
            videoElement.loop = true;
            videoElement.muted = true;
            videoElement.playsInline = true;
            videoElement.style.position = 'absolute';
            videoElement.style.width = '1px';
            videoElement.style.height = '1px';
            videoElement.style.opacity = '0.01';
            document.body.appendChild(videoElement);

            videoTexture = new THREE.VideoTexture(videoElement);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;

            const aspect = window.innerWidth / window.innerHeight;
            const bgGeometry = new THREE.PlaneGeometry(2 * aspect, 2);
            const bgMaterial = new THREE.MeshBasicMaterial({ map: videoTexture, depthTest: false, depthWrite: false });
            videoBackgroundPlane = new THREE.Mesh(bgGeometry, bgMaterial);
            videoBackgroundPlane.position.set(0, 0, -1);
            
            const backgroundScene = new THREE.Scene();
            const backgroundCamera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0, 1);
            backgroundScene.add(videoBackgroundPlane);
            
            renderer.autoClear = false;
            window.backgroundPipeline = { scene: backgroundScene, camera: backgroundCamera };

            setupPlaybackUIListeners();
        }

        function adjustVideoPlaneScale() {
            if (!videoElement || !videoBackgroundPlane) return;
            const aspect = window.innerWidth / window.innerHeight;
            const videoAspect = videoElement.videoWidth / videoElement.videoHeight;
            
            if (aspect > videoAspect) {
                videoBackgroundPlane.scale.set(aspect / videoAspect, 1, 1);
            } else {
                videoBackgroundPlane.scale.set(1, videoAspect / aspect, 1);
            }
        }

        // --- Timeline & Controls ---
        function setupPlaybackUIListeners() {
            const playBtn = document.getElementById('btn-video-play');
            const timelineSlider = document.getElementById('timeline-slider');
            const timeDisplay = document.getElementById('timeline-time');

            // Video Upload Selection
            document.getElementById('video-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    videoElement.src = url;
                    videoElement.addEventListener('loadedmetadata', () => {
                        timelineSlider.max = Math.floor(videoElement.duration);
                        timeDisplay.innerText = `00:00 / ${formatTimeDisplay(videoElement.duration)}`;
                        adjustVideoPlaneScale();
                        document.getElementById('hud-video').innerText = file.name.substring(0, 15) + "...";
                        document.getElementById('hud-video').className = "status-val val-on";
                    });
                    videoElement.play();
                    playBtn.innerText = "⏸";
                    updateHUDLog(`Loaded video: ${file.name}`);
                }
            });

            // YOLO JSON Motion Upload Selection
            document.getElementById('motion-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        try {
                            importedMotionTrack = JSON.parse(event.target.result);
                            updateHUDLog(`⚡ Loaded YOLO Motion: ${importedMotionTrack.length} keyframes sync'd!`);
                            
                            const ds = document.getElementById('hud-dataset');
                            ds.innerText = `${importedMotionTrack.length} Frames`;
                            ds.className = "status-val val-on";
                            
                            renderTrackMarkers();
                        } catch (err) {
                            updateHUDLog("❌ Error: Invalid JSON File structure.");
                            console.error(err);
                        }
                    };
                    reader.readAsText(file);
                }
            });

            // UI Slider & Playhead Sync
            playBtn.addEventListener('click', () => {
                if (videoElement.paused) { videoElement.play(); playBtn.innerText = "⏸"; }
                else { videoElement.pause(); playBtn.innerText = "▶"; }
            });

            timelineSlider.addEventListener('input', (e) => {
                videoElement.currentTime = parseFloat(e.target.value);
            });

            videoElement.addEventListener('timeupdate', () => {
                if (!timelineSlider.matches(':active')) { 
                    timelineSlider.value = Math.floor(videoElement.currentTime);
                }
                timeDisplay.innerText = `${formatTimeDisplay(videoElement.currentTime)} / ${formatTimeDisplay(videoElement.duration)}`;
                
                // Read from YOLO data if loaded
                applyMotionFrame(videoElement.currentTime);
            });
        }

        // Apply coordinates parsed from JSON
        function applyMotionFrame(currentTime) {
            if (importedMotionTrack.length === 0) return;

            // Find frame with closest timestamp match
            const activeFrame = importedMotionTrack.reduce((prev, curr) => {
                return (Math.abs(curr.timestamp - currentTime) < Math.abs(prev.timestamp - currentTime)) ? curr : prev;
            });

            // Inject rotation matrix into the character rig
            if (activeFrame && Math.abs(activeFrame.timestamp - currentTime) < 0.15) {
                const rot = activeFrame.rotations;
                if (boneMap.shoulderL) boneMap.shoulderL.rotation.z = rot.shoulderL;
                if (boneMap.elbowL) boneMap.elbowL.rotation.z = rot.elbowL;
                if (boneMap.shoulderR) boneMap.shoulderR.rotation.z = rot.shoulderR;
                if (boneMap.elbowR) boneMap.elbowR.rotation.z = rot.elbowR;
                if (boneMap.hipL) boneMap.hipL.rotation.z = rot.hipL;
                if (boneMap.kneeL) boneMap.kneeL.rotation.x = rot.kneeL;
                if (boneMap.hipR) boneMap.hipR.rotation.z = rot.hipR;
                if (boneMap.kneeR) boneMap.kneeR.rotation.x = rot.kneeR;
            }
        }

        function renderTrackMarkers() {
            const track = document.getElementById('keyframe-track-wrapper');
            track.innerHTML = '';
            if (!videoElement || videoElement.duration === 0) return;

            // Render subtle diamond tickmarks representing motion markers (approx every 15 frames to prevent congestion)
            importedMotionTrack.forEach((pose, index) => {
                if (index % 15 !== 0) return;
                const percent = (pose.timestamp / videoElement.duration) * 100;
                const tick = document.createElement('div');
                tick.className = 'keyframe-marker';
                tick.style.left = `${percent}%`;
                track.appendChild(tick);
            });
        }

        // --- Model Rig Loader ---
        function loadRigModel() {
            const loader = new THREE.GLTFLoader();
            loader.load('Xbot.glb', (gltf) => {
                const character = gltf.scene;
                character.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        characterMeshes.push(child);
                        if (child.material) child.material.skinning = true;
                    }
                    if (child.isBone) {
                        Object.keys(boneTargetNames).forEach(key => {
                            if (child.name.endsWith(boneTargetNames[key])) boneMap[key] = child;
                        });
                    }
                });
                scene.add(character);
                updateHUDLog("🎉 Standard 3D Rig Loaded!");
            }, null, () => {
                console.warn("Using procedural rig fallback.");
                generateFallbackRig();
            });
        }

        function generateFallbackRig() {
            // Setup simple procedural capsule bones if Xbot.glb is missing
            const geometry = new THREE.CylinderGeometry(0.06, 0.08, 1.6, 16);
            const mat = new THREE.MeshStandardMaterial({ color: 0x007aff, wireframe: true });
            const mesh = new THREE.SkinnedMesh(geometry, mat);
            mesh.position.y = 0.8;
            scene.add(mesh);

            const root = new THREE.Bone();
            const joint = new THREE.Bone();
            root.position.y = -0.8;
            joint.position.y = 0.8;
            root.add(joint);
            mesh.add(root);
            mesh.bind(new THREE.Skeleton([root, joint]));

            boneMap.shoulderL = root;
            boneMap.elbowL = joint;
        }

        // --- Key Bindings ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'v') document.getElementById('video-input').click();
            if (key === 'j') document.getElementById('motion-input').click();
            if (key === 'x') {
                isXrayMeshMode = !isXrayMeshMode;
                characterMeshes.forEach(mesh => {
                    mesh.material.transparent = isXrayMeshMode;
                    mesh.material.opacity = isXrayMeshMode ? 0.35 : 1.0;
                    mesh.material.wireframe = isXrayMeshMode;
                });
            }
            if (e.code === 'Space') {
                e.preventDefault();
                if (videoElement) {
                    if (videoElement.paused) videoElement.play();
                    else videoElement.pause();
                }
            }
        });

        function updateHUDLog(text) {
            document.getElementById('hud-log').innerText = text;
        }

        function formatTimeDisplay(seconds) {
            if (isNaN(seconds)) return "00:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // --- Core Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            renderer.clear();
            if (window.backgroundPipeline && videoElement && videoElement.readyState >= videoElement.HAVE_CURRENT_DATA) {
                renderer.render(window.backgroundPipeline.scene, window.backgroundPipeline.camera);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustVideoPlaneScale();
        });

        window.addEventListener('DOMContentLoaded', () => {
            setupVideoPlane();
            loadRigModel();
            animate();
        });
    </script>
</body>
</html>
