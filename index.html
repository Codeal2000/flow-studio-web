<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Studio Clone - Studio Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Glassmorphism Sidebar UI */
        #ui-sidebar { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(15, 15, 15, 0.7); width: 340px; max-height: calc(100vh - 40px);
            padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(16px); display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        h1 span { width: 8px; height: 8px; background: #00ff64; border-radius: 50%; box-shadow: 0 0 10px #00ff64; }
        p.subtitle { font-size: 0.8rem; color: #666; margin-top: -15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .section-title { font-size: 0.85rem; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        
        /* Drag & Drop Zones */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 10px;
            padding: 20px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.02);
            transition: all 0.2s ease; position: relative;
        }
        .drop-zone:hover { border-color: #007aff; background: rgba(0, 122, 255, 0.05); }
        .drop-zone p { font-size: 0.8rem; color: #888; pointer-events: none; }
        .drop-zone input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        /* Video Preview Area */
        #video-preview-container { width: 100%; border-radius: 8px; overflow: hidden; background: #000; display: none; border: 1px solid rgba(255,255,255,0.1); }
        #video-preview { width: 100%; height: auto; display: block; }
        
        /* Status Indicator */
        .status-badge { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.04); padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.05); }
        .status-val { color: #007aff; font-weight: bold; }
    </style>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui-sidebar">
        <h1><span></span> Flow Studio Web</h1>
        <p class="subtitle">Next-Gen Pipeline</p>
        
        <div class="status-badge">
            <span>Active Asset:</span>
            <span id="asset-status" class="status-val">Default Proxy Box</span>
        </div>

        <!-- 1. Video Tracking Upload -->
        <div>
            <div class="section-title">1. Tracking Source (Video)</div>
            <div class="drop-zone">
                <p>Drag & drop reference video or click to upload</p>
                <input type="file" id="video-input" accept="video/*">
            </div>
            <div id="video-preview-container" style="margin-top: 10px;">
                <video id="video-preview" controls muted></video>
            </div>
        </div>

        <!-- 2. Target 3D Character Upload -->
        <div>
            <div class="section-title">2. Target Character (GLTF / GLB)</div>
            <div class="drop-zone">
                <p>Drag & drop .gltf / .glb character files</p>
                <input type="file" id="model-input" accept=".gltf,.glb">
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>
<script>
  // --- DYNAMIC RIGGING MAPPER ---
// Maps MediaPipe data tracking point IDs straight to standard character bone roles
const BONE_MAP = {
    "11": "LeftArm",       // Left Shoulder
    "12": "RightArm",      // Right Shoulder
    "13": "LeftForeArm",   // Left Elbow
    "14": "RightForeArm",  // Right Elbow
    "23": "LeftUpLeg",     // Left Hip
    "24": "RightUpLeg",    // Right Hip
    "25": "LeftLeg",       // Left Knee
    "26": "RightLeg"       // Right Knee
};

let characterBones = {}; // Holds references to your actual 3D model's bones

// Scans an uploaded character model to find and bind its internal bones
function scanCharacterSkeleton(model) {
    characterBones = {}; // Clear previous map
    console.log("Analyzing character rigging structure...");

    model.traverse((node) => {
        if (node.isBone) {
            const boneName = node.name.toLowerCase();
            
            // Fuzzy match names commonly used by Mixamo, Blender, and Unreal Engine
            if (boneName.includes('leftarm') || boneName.includes('leftshoulder')) characterBones["11"] = node;
            if (boneName.includes('rightarm') || boneName.includes('rightshoulder')) characterBones["12"] = node;
            if (boneName.includes('leftforearm') || boneName.includes('leftelbow')) characterBones["13"] = node;
            if (boneName.includes('rightforearm') || boneName.includes('rightelbow')) characterBones["14"] = node;
            if (boneName.includes('leftupleg') || boneName.includes('lefthip')) characterBones["23"] = node;
            if (boneName.includes('rightupleg') || boneName.includes('righthip')) characterBones["24"] = node;
            if (boneName.includes('leftleg') || boneName.includes('leftknee')) characterBones["25"] = node;
            if (boneName.includes('rightleg') || boneName.includes('rightknee')) characterBones["26"] = node;
        }
    });

    const bonesFound = Object.keys(characterBones).length;
    console.log(`Skeleton Analysis Complete. Bound ${bonesFound} essential rigging nodes.`);
    
    if (bonesFound < 4) {
        document.getElementById('asset-status').innerText = "Warning: Unstandardized Rig";
        document.getElementById('asset-status').style.color = "#ffaa00";
    }
}

// --- TEST RIG ANIMATION FUNCTION ---
// Simulates tracking data rotations using mathematical waves to verify structural stability
function applyTestRigRotations(elapsedTime) {
    // If a custom model with bones is active, let's rotate its arms smoothly
    if (characterBones["11"] && characterBones["12"]) {
        // Calculate a smooth rotational wave for the shoulders
        const wave = Math.sin(elapsedTime * 2) * 0.5;
        
        // Apply rotations cleanly using Quaternions to eliminate gimbal lock distortion
        characterBones["11"].quaternion.setFromAxisAngle(new THREE.Vector3(0, 0, 1), wave);  // Wave left arm
        characterBones["12"].quaternion.setFromAxisAngle(new THREE.Vector3(0, 0, -1), wave); // Wave right arm
        
        // Add a secondary fold rotation to the elbows
        if (characterBones["13"]) characterBones["13"].quaternion.setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.abs(wave));
        if (characterBones["14"]) characterBones["14"].quaternion.setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.abs(wave));
    } else if (activeActor && !activeActor.isMesh) {
        // Fallback placeholder animation if character contains no compatible bones
        activeActor.rotation.y = elapsedTime * 0.3;
    }
}
    </script>
</body>
</html>
